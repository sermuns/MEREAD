[package]
name = "meread"
version = "0.5.0"
description = "preview github flavored markdown locally"
repository = "https://github.com/sermuns/meread"
license = "WTFPL"
edition = "2024"
keywords = ["readme", "markdown", "preview", "server"]
categories = ["command-line-utilities", "web-programming::http-server"]
authors = ["Samuel Åkesson <sermuns@lysator.liu.se>"]

[dependencies]
notify-debouncer-full = "0.7"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tower-http = { version = "0.6", features = ["fs"] }
notify = "8"
clap = { version = "4", features = ["derive"] }
askama = "0.15"
rust-embed = "8"
open = "5"
time = { version = "0.3", features = [
	"formatting",
	"local-offset",
	"macros",
] }
hyper = { version = "1.8", default-features = false }
futures = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }
comrak = { version = "0.51", features = ["shortcodes", "syntect"] }
syntect = "5.3"
mime_guess = "2"
color-eyre = "0.6"
math-core = "0.5"
clap_mangen = "0.2"

[profile.release]
opt-level = 3
debug = false
panic = "unwind"
lto = true
codegen-units = 1
strip = true
