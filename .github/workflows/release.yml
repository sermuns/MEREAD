# Based on https://github.com/tommilligan/mdbook-admonish/blob/main/.github/workflows/deploy.yml

name: Release
on:
  push:
    tags:
      - "*"

env:
  CRATE_NAME: meread

jobs:
  github_build:
    name: Build release binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: aarch64-unknown-linux-musl.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: x86_64-unknown-linux-musl.tar.gz
          - target: x86_64-apple-darwin
            os: macOS-latest
            name: x86_64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - if: ${{ endsWith(matrix.target, '-linux-musl') }}
        uses: taiki-e/install-action@cross

      - if: ${{ endsWith(matrix.target, '-linux-musl') }}
        run: cross build --package ${{ env.CRATE_NAME }} --release --target ${{ matrix.target }}

      - if: ${{ !endsWith(matrix.target , '-linux-musl') }}
        run: cargo build --package ${{ env.CRATE_NAME }} --release --target ${{ matrix.target }}

      - if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: cargo build --package meread-nvim --release --target ${{ matrix.target }}

      - shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        id: extract_tag

      - if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p target/stage
          cd target/${{ matrix.target }}/release
          7z a ../../stage/${{ env.CRATE_NAME }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }} ${{ env.CRATE_NAME }}.exe

      - if: matrix.os != 'windows-latest'
        run: |
          mkdir -p target/stage
          cd target/${{ matrix.target }}/release
          tar czvf ../../stage/${{ env.CRATE_NAME }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }} ${{ env.CRATE_NAME }}

      - if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: |
          cd target/${{ matrix.target }}/release
          cp libmeread_nvim.so ../../stage/meread-${{ steps.extract_tag.outputs.tag }}.so

      - name: Post Setup | Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.CRATE_NAME }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }}
          path: target/stage/*
          overwrite: true

  github_release:
    name: Create GitHub Release
    needs: github_build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup | Artifacts
        uses: actions/download-artifact@v8

      - name: Setup | Extract version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: extract_version

      - name: Setup | Release notes
        run: |
          sed -n '/^## \[${{ steps.extract_version.outputs.version }}\].*$/,/^## /p' CHANGELOG.md | sed '$d' > RELEASE.md

      - name: Build | Publish
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.CRATE_NAME }}-*/${{ env.CRATE_NAME }}-*
          body_path: RELEASE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
